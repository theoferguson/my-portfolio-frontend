# The Qwik Cloudflare Pages adapter requires the Pages runtime (env.ASSETS binding).
name = "my-portfolio-frontend"
compatibility_date = "2025-08-26"
pages_build_output_dir = "./dist"

[vars]
VITE_API_BASE_URL = "https://theo-portfolio-backend-white-rain-2600.fly.dev/api"